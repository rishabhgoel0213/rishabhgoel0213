services:
  site:
    image: caddy:2.10-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - .:/repo:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  tunnel:
    image: cloudflare/cloudflared:2026.3.0
    restart: unless-stopped
    command: tunnel --config /home/nonroot/config.yml run
    depends_on:
      - site
    volumes:
      - ./cloudflared/config.yml:/home/nonroot/config.yml:ro
      - ${HOME}/.cloudflared:/home/nonroot/.cloudflared:ro

volumes:
  caddy_data:
  caddy_config:
